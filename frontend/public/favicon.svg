<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Left face gradient: Royal blue to Dark blue -->
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <!-- Right face gradient: Bright Blue to Navy/Indigo -->
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>
    <!-- Top face gradient: Cyan to Royal blue -->
    <linearGradient id="topFace" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <!-- Shadow filter for clean soft drop-shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Group with drop shadow for premium look -->
  <g filter="url(#shadow)">
    <!-- Top Face (Rhombus) -->
    <polygon points="50,15 85,35 50,55 15,35" fill="url(#topFace)" />

    <!-- Left Face -->
    <polygon points="15,35 50,55 50,85 15,65" fill="url(#leftFace)" />

    <!-- Right Face -->
    <polygon points="50,55 85,35 85,65 50,85" fill="url(#rightFace)" />

    <!-- Subtle inner neon accent lines to represent modern logistics/smart tracking -->
    <polyline points="50,25 72,37 50,50 28,37 50,25" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4" />
    <line x1="50" y1="50" x2="50" y2="72" stroke="#ffffff" stroke-width="1.5" opacity="0.4" />
  </g>
</svg>